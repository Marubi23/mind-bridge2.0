<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call | MindBridge Kenya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a2e;
            color: white;
            overflow: hidden;
        }

        .video-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .video-header h2 {
            font-size: 1.2rem;
        }

        .session-info {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .session-timer {
            font-family: monospace;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }

        .end-call-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .end-call-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .videos-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
            background: #0f0f1a;
        }

        .video-wrapper {
            position: relative;
            background: #2a2a3e;
            border-radius: 16px;
            overflow: hidden;
            min-height: 300px;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.6);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            background: linear-gradient(135deg, #1e3a5f, #0f2b44);
        }

        .video-placeholder i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            background: #2a2a3e;
            color: white;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .control-btn.active {
            background: #ef4444;
        }

        .control-btn.mic-off {
            background: #ef4444;
        }

        .control-btn.cam-off {
            background: #ef4444;
        }

        .waiting-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .waiting-content {
            text-align: center;
        }

        .waiting-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #1e3a5f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .videos-grid {
                grid-template-columns: 1fr;
            }
            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="video-header">
            <h2><i class="fas fa-video"></i> MindBridge Secure Session</h2>
            <div class="session-info">
                <span class="session-timer" id="sessionTimer">00:00</span>
                <button class="end-call-btn" onclick="endCall()">
                    <i class="fas fa-phone-slash"></i> End Call
                </button>
            </div>
        </div>

        <div class="videos-grid">
            <div class="video-wrapper" id="remoteVideoWrapper">
                <div class="video-placeholder" id="remotePlaceholder">
                    <i class="fas fa-user-circle"></i>
                    <p id="remoteName">Therapist</p>
                    <small>Waiting to connect...</small>
                </div>
                <video id="remoteVideo" autoplay playsinline style="display: none;"></video>
                <div class="video-label" id="remoteLabel">Therapist</div>
            </div>

            <div class="video-wrapper" id="localVideoWrapper">
                <div class="video-placeholder" id="localPlaceholder">
                    <i class="fas fa-user-circle"></i>
                    <p>You</p>
                    <small>Camera off</small>
                </div>
                <video id="localVideo" autoplay playsinline muted style="display: none;"></video>
                <div class="video-label">You</div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="micBtn" onclick="toggleMic()" title="Microphone">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn" id="camBtn" onclick="toggleCamera()" title="Camera">
                <i class="fas fa-video"></i>
            </button>
            <button class="control-btn" id="screenBtn" onclick="shareScreen()" title="Share Screen">
                <i class="fas fa-desktop"></i>
            </button>
            <button class="control-btn" id="chatBtn" onclick="toggleChat()" title="Chat">
                <i class="fas fa-comment"></i>
            </button>
        </div>
    </div>

    <div class="waiting-screen" id="waitingScreen">
        <div class="waiting-content">
            <div class="waiting-spinner"></div>
            <h2>Connecting to session...</h2>
            <p id="waitingMessage">Please wait while we connect you</p>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        const bookingId = urlParams.get('booking');
        const userRole = urlParams.get('role');

        // WebRTC variables
        let localStream = null;
        let peerConnection = null;
        let isMicOn = true;
        let isCamOn = true;
        let sessionStartTime = null;
        let timerInterval = null;

        // Configuration
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Socket.io for signaling (you'll need to set up a signaling server)
        // For now, we'll use a simplified version
        let socket = null;

        // Initialize
        async function init() {
            if (!roomName) {
                alert('Invalid session. Redirecting to dashboard.');
                window.location.href = userRole === 'therapist' ? 'therapist/dashboard.html' : 'client/dashboard.html';
                return;
            }

            // Validate room access
            await validateRoomAccess();
            
            // Start timer
            startTimer();
            
            // Initialize camera and mic
            await initLocalStream();
            
            // Connect to signaling server
            initSignaling();
        }

        async function validateRoomAccess() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            try {
                const response = await fetch(`http://localhost:3000/api/video/validate/${roomName}/${user.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.authorized) {
                    alert('You are not authorized to join this session.');
                    window.location.href = userRole === 'therapist' ? 'therapist/dashboard.html' : 'client/dashboard.html';
                }
                
                // Update names based on role
                if (userRole === 'therapist') {
                    document.getElementById('remoteName').textContent = 'Client';
                    document.querySelector('#remoteLabel').textContent = 'Client';
                } else {
                    document.getElementById('remoteName').textContent = 'Therapist';
                }
                
            } catch (error) {
                console.error('Room validation error:', error);
            }
        }

        async function initLocalStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = localStream;
                localVideo.style.display = 'block';
                document.getElementById('localPlaceholder').style.display = 'none';
                
                // Create peer connection
                createPeerConnection();
                
                // Add local stream tracks
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                // Hide waiting screen after connection
                setTimeout(() => {
                    document.getElementById('waitingScreen').style.display = 'none';
                }, 2000);
                
            } catch (error) {
                console.error('Error accessing camera/mic:', error);
                document.getElementById('waitingMessage').textContent = 'Unable to access camera/microphone. Please check permissions.';
                
                // Show placeholder without video
                document.getElementById('localPlaceholder').style.display = 'flex';
            }
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal({ type: 'candidate', candidate: event.candidate });
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    remoteVideo.style.display = 'block';
                    document.getElementById('remotePlaceholder').style.display = 'none';
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    console.log('Connected to peer');
                    document.getElementById('waitingScreen').style.display = 'none';
                }
            };
        }

        function initSignaling() {
            // For production, you'll need a WebSocket server
            // This is a simplified version using HTTP polling
            console.log('Signaling initialized');
            
            // Create offer if user is therapist
            if (userRole === 'therapist') {
                createOffer();
            }
        }

        async function createOffer() {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            sendSignal({ type: 'offer', offer: offer });
        }

        function sendSignal(signal) {
            // In production, send via WebSocket
            console.log('Signal sent:', signal);
        }

        // Control functions
        function toggleMic() {
            if (localStream) {
                const audioTracks = localStream.getAudioTracks();
                audioTracks.forEach(track => {
                    track.enabled = !track.enabled;
                });
                isMicOn = audioTracks[0]?.enabled;
                
                const micBtn = document.getElementById('micBtn');
                if (!isMicOn) {
                    micBtn.classList.add('mic-off');
                    micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                } else {
                    micBtn.classList.remove('mic-off');
                    micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                }
            }
        }

        function toggleCamera() {
            if (localStream) {
                const videoTracks = localStream.getVideoTracks();
                videoTracks.forEach(track => {
                    track.enabled = !track.enabled;
                });
                isCamOn = videoTracks[0]?.enabled;
                
                const camBtn = document.getElementById('camBtn');
                if (!isCamOn) {
                    camBtn.classList.add('cam-off');
                    camBtn.innerHTML = '<i class="fas fa-video-slash"></i>';
                    document.getElementById('localVideo').style.display = 'none';
                    document.getElementById('localPlaceholder').style.display = 'flex';
                } else {
                    camBtn.classList.remove('cam-off');
                    camBtn.innerHTML = '<i class="fas fa-video"></i>';
                    document.getElementById('localVideo').style.display = 'block';
                    document.getElementById('localPlaceholder').style.display = 'none';
                }
            }
        }

        async function shareScreen() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                
                // Replace video track with screen share
                const videoTrack = screenStream.getVideoTracks()[0];
                const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                await sender.replaceTrack(videoTrack);
                
                videoTrack.onended = () => {
                    // Restore camera when screen share ends
                    const originalVideoTrack = localStream.getVideoTracks()[0];
                    sender.replaceTrack(originalVideoTrack);
                };
                
            } catch (error) {
                console.error('Screen share error:', error);
            }
        }

        function toggleChat() {
            alert('Chat feature coming soon!');
        }

        function startTimer() {
            sessionStartTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('sessionTimer').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        async function endCall() {
            if (confirm('Are you sure you want to end this call?')) {
                // Stop local stream
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                // Close peer connection
                if (peerConnection) {
                    peerConnection.close();
                }
                
                // Clear timer
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                
                // Record session end in backend
                try {
                    await fetch(`http://localhost:3000/api/video/end/${bookingId}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                } catch (error) {
                    console.error('Error ending session:', error);
                }
                
                // Redirect to dashboard
                window.location.href = userRole === 'therapist' ? 'therapist/dashboard.html' : 'client/dashboard.html';
            }
        }

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peerConnection) {
                peerConnection.close();
            }
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
