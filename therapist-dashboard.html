<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Therapist Dashboard | MindBridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .dashboard-header {
            background: linear-gradient(135deg, #1e3a5f, #0f2b44);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .section {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .section h2 {
            margin-bottom: 1rem;
            color: #1e3a5f;
        }
        
        .message-item, .booking-item {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        
        .message-item:hover, .booking-item:hover {
            background: #f9f9f9;
        }
        
        .message-unread {
            background: #e8f4f8;
            border-left: 4px solid #1e3a5f;
        }
        
        .video-session {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        
        .btn-join {
            background: #10b981;
            color: white;
        }
        
        .login-form {
            max-width: 400px;
            margin: 4rem auto;
            background: white;
            padding: 2rem;
            border-radius: 20px;
        }
        
        .login-form input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login form will show first -->
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000';
        let currentTherapistId = null;
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // For demo, we'll use a simple login
            // In production, implement proper JWT authentication
            const response = await fetch(`${API_URL}/api/therapists`);
            const therapists = await response.json();
            
            const therapist = therapists.find(t => t.email === email);
            if (therapist) {
                currentTherapistId = therapist.user_id;
                loadDashboard();
            } else {
                alert('Invalid credentials');
            }
        }
        
        async function loadDashboard() {
            // Get dashboard data
            const response = await fetch(`${API_URL}/api/therapists/${currentTherapistId}/dashboard`);
            const data = await response.json();
            
            // Get unread messages
            const messagesRes = await fetch(`${API_URL}/api/users/${currentTherapistId}/messages/unread`);
            const messages = await messagesRes.json();
            
            // Get upcoming bookings
            const bookingsRes = await fetch(`${API_URL}/api/therapists/${currentTherapistId}/bookings`);
            const bookings = await bookingsRes.json();
            
            // Render dashboard
            document.getElementById('app').innerHTML = `
                <div class="dashboard-container">
                    <div class="dashboard-header">
                        <h1>Welcome back, ${getTherapistName()}</h1>
                        <p>Here's what's happening with your practice today</p>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Unread Messages</h3>
                            <div class="stat-number">${data.unread_count}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Upcoming Bookings</h3>
                            <div class="stat-number">${data.upcoming_count}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Active Sessions</h3>
                            <div class="stat-number">${data.active_sessions.length}</div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h2>📩 Unread Messages</h2>
                        ${messages.length === 0 ? '<p>No unread messages</p>' : 
                            messages.map(msg => `
                                <div class="message-item message-unread" onclick="markAsRead(${msg.message_id})">
                                    <strong>From: ${msg.from_name}</strong>
                                    <p>${msg.message.substring(0, 100)}...</p>
                                    <small>${new Date(msg.created_at).toLocaleString()}</small>
                                </div>
                            `).join('')
                        }
                    </div>
                    
                    <div class="section">
                        <h2>📅 Upcoming Bookings</h2>
                        ${bookings.length === 0 ? '<p>No upcoming bookings</p>' : 
                            bookings.map(booking => `
                                <div class="booking-item">
                                    <strong>${booking.client_name}</strong>
                                    <p>${booking.booking_date} at ${booking.booking_time}</p>
                                    <span class="status">${booking.status}</span>
                                    ${booking.session_type === 'video' ? 
                                        `<button class="btn btn-join" onclick="startVideoSession(${booking.booking_id})">Join Video Call</button>` : 
                                        ''}
                                </div>
                            `).join('')
                        }
                    </div>
                    
                    <div class="section">
                        <h2>🎥 Active Video Sessions</h2>
                        ${data.active_sessions.length === 0 ? '<p>No active video sessions</p>' : 
                            data.active_sessions.map(session => `
                                <div class="video-session">
                                    <strong>Session with: ${session.client_name}</strong>
                                    <p>Room: ${session.room_name}</p>
                                    <button class="btn btn-join" onclick="joinVideoCall('${session.room_name}')">Join Session Now</button>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            `;
        }
        
        function getTherapistName() {
            // Get from session storage or fetch
            return "Dr. Sarah Johnson";
        }
        
        async function markAsRead(messageId) {
            await fetch(`${API_URL}/api/messages/${messageId}/read`, {
                method: 'PUT'
            });
            loadDashboard();
        }
        
        function startVideoSession(bookingId) {
            alert(`Starting video session for booking ${bookingId}`);
            // In production: Create video room and redirect
        }
        
        function joinVideoCall(roomName) {
            alert(`Joining video room: ${roomName}`);
            // In production: Redirect to video call page with room name
        }
        
        // Show login form initially
        document.getElementById('app').innerHTML = `
            <div class="login-form">
                <h2>Therapist Login</h2>
                <input type="email" id="email" placeholder="Email" value="sarah@mindbridge.com">
                <input type="password" id="password" placeholder="Password" value="therapist123">
                <button class="btn btn-primary" onclick="login()">Login</button>
            </div>
        `;
    </script>
</body>
</html>
