<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MindBridge Kenya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-brand">
                    <img src="assets/images/mind-bridge-logo.JPG" alt="MindBridge Kenya">
                    <h1>Join MindBridge</h1>
                    <p>Create your account and start your mental wellness journey today</p>
                </div>
                <div class="auth-features">
                    <div class="feature"><i class="fas fa-check-circle"></i> Secure & Confidential</div>
                    <div class="feature"><i class="fas fa-user-md"></i> Licensed Therapists</div>
                    <div class="feature"><i class="fas fa-video"></i> Video Sessions</div>
                    <div class="feature"><i class="fas fa-heart"></i> 24/7 Crisis Support</div>
                </div>
            </div>
            <div class="auth-right">
                <form id="signupForm" class="auth-form">
                    <h2>Create Account</h2>
                    
                    <!-- Step Indicators -->
                    <div class="step-indicator">
                        <div class="step-dot active" data-step="1">
                            <div class="dot">1</div>
                            <span class="step-label">Basic Info</span>
                        </div>
                        <div class="step-dot" data-step="2">
                            <div class="dot">2</div>
                            <span class="step-label">Account</span>
                        </div>
                        <div class="step-dot" data-step="3">
                            <div class="dot">3</div>
                            <span class="step-label">Profile</span>
                        </div>
                    </div>
                    
                    <!-- Step 1: Basic Information -->
                    <div class="step active" id="step1">
                        <div class="form-group">
                            <label>Full Name</label>
                            <div class="input-group">
                                <i class="fas fa-user"></i>
                                <input type="text" id="fullName" placeholder="Enter your full name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-group">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="email" placeholder="Enter your email" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Phone Number (Optional)</label>
                            <div class="input-group">
                                <i class="fas fa-phone"></i>
                                <input type="tel" id="phone" placeholder="+254 700 123 456">
                            </div>
                        </div>
                        <button type="button" class="btn-login btn-next" onclick="nextStep(2)">Next <i class="fas fa-arrow-right"></i></button>
                    </div>
                    
                    <!-- Step 2: Account Security -->
                    <div class="step" id="step2">
                        <div class="form-group">
                            <label>Create Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" placeholder="Create a password" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small style="color: var(--gray); font-size: 0.7rem;">Minimum 6 characters</small>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>I am a:</label>
                            <select id="role" class="form-select" required>
                                <option value="client">Client seeking therapy</option>
                                <option value="therapist">Therapist (Licensed)</option>
                            </select>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn-login btn-prev" onclick="prevStep(1)"><i class="fas fa-arrow-left"></i> Back</button>
                            <button type="button" class="btn-login btn-next" onclick="nextStep(3)">Next <i class="fas fa-arrow-right"></i></button>
                        </div>
                    </div>
                    
                    <!-- Step 3: Professional Info (for therapists) or Preferences (for clients) -->
                    <div class="step" id="step3">
                        <div id="therapistFields" style="display: none;">
                            <div class="form-group">
                                <label>License Number</label>
                                <div class="input-group">
                                    <i class="fas fa-id-card"></i>
                                    <input type="text" id="licenseNumber" placeholder="Enter your license number">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Specialization</label>
                                <div class="input-group">
                                    <i class="fas fa-brain"></i>
                                    <input type="text" id="specialization" placeholder="e.g., Anxiety, Depression, Trauma">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Years of Experience</label>
                                <div class="input-group">
                                    <i class="fas fa-calendar"></i>
                                    <input type="number" id="experience" placeholder="Years of experience">
                                </div>
                            </div>
                        </div>
                        <div id="clientFields">
                            <div class="form-group">
                                <label>How did you hear about us?</label>
                                <select id="referral" class="form-select">
                                    <option value="">Select an option</option>
                                    <option>Social Media</option>
                                    <option>Friend/Family</option>
                                    <option>School</option>
                                    <option>Search Engine</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>What would you like help with? (Optional)</label>
                                <div class="input-group">
                                    <i class="fas fa-heart"></i>
                                    <input type="text" id="concern" placeholder="e.g., Anxiety, Stress, Depression">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="checkbox">
                                <input type="checkbox" id="terms" required>
                                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                            </label>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn-login btn-prev" onclick="prevStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
                            <button type="submit" class="btn-login">Create Account <i class="fas fa-check"></i></button>
                        </div>
                    </div>
                    
                    <div id="errorMessage" class="error-message" style="display: none;"></div>
                    <div id="successMessage" class="success-message" style="display: none;"></div>
                    
                    <p class="auth-footer-text">Already have an account? <a href="login.html">Sign In</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentStep = 1;
        const totalSteps = 3;
        
        // Toggle password visibility
        function togglePassword(fieldId) {
            const password = document.getElementById(fieldId);
            const icon = password.parentElement.querySelector('.toggle-password i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // Show/hide therapist fields based on role
        document.getElementById('role').addEventListener('change', function() {
            const therapistFields = document.getElementById('therapistFields');
            const clientFields = document.getElementById('clientFields');
            if (this.value === 'therapist') {
                therapistFields.style.display = 'block';
                clientFields.style.display = 'none';
            } else {
                therapistFields.style.display = 'none';
                clientFields.style.display = 'block';
            }
        });
        
        // Next step
        function nextStep(step) {
            // Validate current step before proceeding
            if (currentStep === 1) {
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                if (!fullName) {
                    showError('Please enter your full name');
                    return;
                }
                if (!email) {
                    showError('Please enter your email address');
                    return;
                }
                if (!email.includes('@')) {
                    showError('Please enter a valid email address');
                    return;
                }
            }
            
            if (currentStep === 2) {
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                if (!password) {
                    showError('Please create a password');
                    return;
                }
                if (password.length < 6) {
                    showError('Password must be at least 6 characters');
                    return;
                }
                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }
            }
            
            hideError();
            
            // Update step display
            document.getElementById(`step${currentStep}`).classList.remove('active');
            document.getElementById(`step${step}`).classList.add('active');
            
            // Update step indicators
            document.querySelectorAll('.step-dot').forEach((dot, index) => {
                const stepNum = index + 1;
                if (stepNum < step) {
                    dot.classList.add('completed');
                    dot.classList.remove('active');
                    const dotDiv = dot.querySelector('.dot');
                    if (stepNum < step) {
                        dotDiv.innerHTML = '<i class="fas fa-check"></i>';
                    }
                } else if (stepNum === step) {
                    dot.classList.add('active');
                    dot.classList.remove('completed');
                    const dotDiv = dot.querySelector('.dot');
                    dotDiv.innerHTML = stepNum;
                } else {
                    dot.classList.remove('active', 'completed');
                    const dotDiv = dot.querySelector('.dot');
                    dotDiv.innerHTML = stepNum;
                }
            });
            
            currentStep = step;
        }
        
        // Previous step
        function prevStep(step) {
            document.getElementById(`step${currentStep}`).classList.remove('active');
            document.getElementById(`step${step}`).classList.add('active');
            
            // Update step indicators
            document.querySelectorAll('.step-dot').forEach((dot, index) => {
                const stepNum = index + 1;
                if (stepNum <= step) {
                    if (stepNum < step) {
                        dot.classList.add('completed');
                        const dotDiv = dot.querySelector('.dot');
                        dotDiv.innerHTML = '<i class="fas fa-check"></i>';
                    } else {
                        dot.classList.add('active');
                        dot.classList.remove('completed');
                        const dotDiv = dot.querySelector('.dot');
                        dotDiv.innerHTML = stepNum;
                    }
                } else {
                    dot.classList.remove('active', 'completed');
                    const dotDiv = dot.querySelector('.dot');
                    dotDiv.innerHTML = stepNum;
                }
            });
            
            currentStep = step;
            hideError();
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
        }
        
        // Form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const terms = document.getElementById('terms').checked;
            
            if (!terms) {
                showError('Please agree to the Terms of Service and Privacy Policy');
                return;
            }
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Prepare data based on role
            let requestData = {
                full_name: fullName,
                email: email,
                password: password,
                role: role
            };
            
            if (role === 'therapist') {
                requestData.license_number = document.getElementById('licenseNumber')?.value;
                requestData.specialization = document.getElementById('specialization')?.value;
                requestData.years_experience = document.getElementById('experience')?.value;
            } else {
                requestData.phone_number = document.getElementById('phone')?.value;
                requestData.referral = document.getElementById('referral')?.value;
                requestData.concern = document.getElementById('concern')?.value;
            }
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = 'Account created successfully! Redirecting to login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please make sure the server is running.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
