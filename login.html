<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | MindBridge Kenya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-brand">
                    <img src="assets/images/mind-bridge-logo.JPG" alt="MindBridge Kenya">
                    <h1>Welcome Back</h1>
                    <p>Sign in to continue your mental wellness journey</p>
                </div>
                <div class="auth-features">
                    <div class="feature"><i class="fas fa-check-circle"></i> Secure & Confidential</div>
                    <div class="feature"><i class="fas fa-user-md"></i> Licensed Therapists</div>
                    <div class="feature"><i class="fas fa-video"></i> Video Sessions</div>
                </div>
            </div>
            <div class="auth-right">
                <form id="loginForm" class="auth-form">
                    <h2>Sign In</h2>
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Enter your email" required></div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Enter your password" required><button type="button" class="toggle-password" onclick="togglePassword()"><i class="fas fa-eye"></i></button></div>
                    </div>
                    <div class="form-options"><label class="checkbox"><input type="checkbox" id="rememberMe"> Remember me</label><a href="forgot-password.html" class="forgot-link">Forgot Password?</a></div>
                    <button type="submit" class="btn-login">Sign In</button>
                    <div class="auth-divider">or</div>
                    <a href="signup.html" class="btn-google"><i class="fab fa-google"></i> Continue with Google</a>
                    <div id="errorMessage" class="error-message" style="display: none;"></div>
                    <p class="auth-footer-text">Don't have an account? <a href="signup.html">Create Account</a></p>
                </form>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        function togglePassword() { const pwd = document.getElementById('password'); const icon = document.querySelector('.toggle-password i'); if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } else { pwd.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } }
        document.getElementById('loginForm').addEventListener('submit', async (e) => { e.preventDefault(); const email = document.getElementById('email').value; const password = document.getElementById('password').value; const rememberMe = document.getElementById('rememberMe').checked; const errorDiv = document.getElementById('errorMessage'); errorDiv.style.display = 'none'; try { const response = await fetch('http://localhost:3000/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) }); const data = await response.json(); if (response.ok) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); if (rememberMe) localStorage.setItem('rememberMe', 'true'); if (data.user.role === 'admin') window.location.href = 'admin/dashboard.html'; else if (data.user.role === 'therapist') window.location.href = 'therapist/dashboard.html'; else window.location.href = 'client/dashboard.html'; } else { errorDiv.textContent = data.error || 'Invalid credentials'; errorDiv.style.display = 'block'; } } catch (error) { errorDiv.textContent = 'Network error. Please make sure the server is running.'; errorDiv.style.display = 'block'; } });
    </script>
</body>
</html>
